<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row" id="info"></div>
    </div>
</body>
<script>
    const api = `https://fakestoreapi.com/products`;

    const Apicall = () => {
        fetch(api)
            .then((res) => res.json())
            .then((res) => fundata(res))
            .catch((err) => console.log(err))
    }

    Apicall();

    let fundata = (data) => {
        let container = document.getElementById('info');

        data.forEach(el => {
            container.innerHTML += `
                 
             <div class="col-12 col-md-6 col-lg-3">

                <div class="card h-100">

            <div class="card-body">

            <img src="${el.image}" class="card-img-top" style="height:200px; object-fit:contain;">

            <h6 class="card-title">"${el.title}"</h6>
            <p class="text-success fw-bold">₹ ${el.price}</p>
            <button class="btn btn-primary w-100">Buy Now</button>
          </div>

                    </div>
                </div>
            </div>

             `
        });
    }











</script>

</html>
